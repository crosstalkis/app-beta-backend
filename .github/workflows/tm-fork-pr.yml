name: tm-fork-pr

# T-8 (PR-from-fork) — document the supply-chain entry point. A pull_request
# from a FORK runs with a read-only GITHUB_TOKEN and GitHub caps the workflow's
# requested permissions, so `id-token: write` is downgraded and no OIDC token
# is mintable -> the workflow cannot authenticate to Conjur at all. That is the
# expected, safe result.
#
# IMPORTANT: this is only meaningful when triggered by a PR FROM A FORK. A PR
# from a branch in this same repo DOES get id-token (the job will then attempt
# auth and report) — so to actually evidence T-8, open the PR from a fork owned
# by a second account. Never convert this to `pull_request_target` with a
# checkout of the PR head — that is the exact anti-pattern T-8 exists to avoid.
#
# Diagnostic only — never hard-fails; it records what the fork context allows.

on:
  pull_request:

permissions:
  id-token: write
  contents: read

env:
  AUDIENCE: conjur/lab/topo
  CONJUR_URL: https://conjur-oss.conjur.svc.cluster.local
  CONJUR_SERVICE_ID: gha-v4
  CONJUR_ACCOUNT: lab
  CONJUR_CACERT: /etc/conjur/ssl/ca.pem
  HOST_ID: sas-topo/sas-beta/ops-dev

jobs:
  fork-probe:
    runs-on: lab-runners
    steps:
      - name: Probe OIDC availability + Conjur reachability from PR context
        run: |
          set -euo pipefail

          echo "Event: ${GITHUB_EVENT_NAME}  head_repo=${GITHUB_HEAD_REF:-n/a}"
          echo "Actor: ${GITHUB_ACTOR}  base_repo=${GITHUB_REPOSITORY}"

          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
            echo "TM_FORK oidc=UNAVAILABLE conjur=UNREACHABLE verdict=SAFE"
            echo "No OIDC request token in this context — GitHub downgraded id-token: write."
            echo "This is the expected fork-PR behaviour: secrets/Conjur are unreachable."
            exit 0
          fi

          echo "OIDC request token IS present (this is likely a SAME-REPO PR, not a fork)."
          echo "Attempting to mint + authenticate as ${HOST_ID} for evidence..."
          jwt=$(curl -sSf \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}" | jq -r '.value')
          echo "::add-mask::${jwt}"

          # Show the claims the PR context produced (esp. repository / owner).
          payload_b64="${jwt#*.}"; payload_b64="${payload_b64%%.*}"
          b64="${payload_b64//-/+}"; b64="${b64//_/\/}"
          pad=$(( (4 - ${#b64} % 4) % 4 ))
          b64="${b64}$(printf '%*s' "${pad}" '' | tr ' ' '=')"
          payload_json=$(printf '%s' "${b64}" | base64 -d 2>/dev/null)
          echo "ref=$(jq -r '.ref' <<< "${payload_json}")  repository=$(jq -r '.repository' <<< "${payload_json}")  repo_property_sas_id=$(jq -r '.repo_property_sas_id // "<absent>"' <<< "${payload_json}")"

          login_enc=$(printf 'host/%s' "${HOST_ID}" | jq -sRr @uri)
          code=$(curl -sS -o /dev/null -w '%{http_code}' --cacert "${CONJUR_CACERT}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "jwt=${jwt}" \
            "${CONJUR_URL}/authn-jwt/${CONJUR_SERVICE_ID}/${CONJUR_ACCOUNT}/${login_enc}/authenticate")
          echo "TM_FORK oidc=AVAILABLE authn_as_ops_dev=${code} note=same-repo-PR-not-a-fork"
          echo "Re-run from an actual fork PR to evidence the UNAVAILABLE/SAFE path."
