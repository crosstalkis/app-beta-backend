name: tm-replay

# T-5 (JWT replay) — quantify the replay window. Mints ONE JWT, authenticates
# as ops-prod (expect 200), then re-presents the SAME JWT a few seconds later
# and records the second status.
#
# On Conjur OSS the expected result is that the SECOND attempt ALSO returns 200:
# OSS does not track jti/nonce, so a captured token is replayable for its whole
# lifetime. That is a genuine residual risk bounded only by the token TTL
# (exp - iat, typically 5-15 min). This job measures that window. (Conjur Cloud
# may behave differently — re-test there when the PwC tenant lands.)
#
# This is a MEASUREMENT, not a pass/fail gate — it never hard-fails on the
# second 200; it reports. Trigger: workflow_dispatch.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AUDIENCE: conjur/lab/topo
  CONJUR_URL: https://conjur-oss.conjur.svc.cluster.local
  CONJUR_SERVICE_ID: gha-v4
  CONJUR_ACCOUNT: lab
  CONJUR_CACERT: /etc/conjur/ssl/ca.pem
  HOST_ID: sas-topo/sas-beta/ops-prod

jobs:
  replay:
    runs-on: lab-runners
    environment: prod
    steps:
      - name: Mint once, authenticate twice with the same JWT
        run: |
          set -euo pipefail

          echo "::group::Mint JWT (audience=${AUDIENCE})"
          jwt=$(curl -sSf \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}" | jq -r '.value')
          echo "::add-mask::${jwt}"
          payload_b64="${jwt#*.}"; payload_b64="${payload_b64%%.*}"
          b64="${payload_b64//-/+}"; b64="${b64//_/\/}"
          pad=$(( (4 - ${#b64} % 4) % 4 ))
          b64="${b64}$(printf '%*s' "${pad}" '' | tr ' ' '=')"
          payload_json=$(printf '%s' "${b64}" | base64 -d 2>/dev/null)
          iat=$(jq -r '.iat' <<< "${payload_json}")
          exp=$(jq -r '.exp' <<< "${payload_json}")
          ttl=$(( exp - iat ))
          echo "iat=${iat} exp=${exp} ttl_seconds=${ttl}"
          echo "::endgroup::"

          login_enc=$(printf 'host/%s' "${HOST_ID}" | jq -sRr @uri)
          auth_url="${CONJUR_URL}/authn-jwt/${CONJUR_SERVICE_ID}/${CONJUR_ACCOUNT}/${login_enc}/authenticate"

          echo "::group::First authentication (expect 200)"
          code1=$(curl -sS -o /dev/null -w '%{http_code}' --cacert "${CONJUR_CACERT}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "jwt=${jwt}" "${auth_url}")
          echo "first attempt -> HTTP ${code1}"
          echo "::endgroup::"

          echo "Waiting 10s before replay..."
          sleep 10

          echo "::group::Replay SAME JWT (OSS: expect 200; that is the finding)"
          code2=$(curl -sS -o /dev/null -w '%{http_code}' --cacert "${CONJUR_CACERT}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "jwt=${jwt}" "${auth_url}")
          echo "replay attempt -> HTTP ${code2}"
          echo "::endgroup::"

          replayable="NO"
          if [[ "${code2}" == "200" ]]; then replayable="YES"; fi
          echo "TM_REPLAY first=${code1} replay=${code2} ttl_seconds=${ttl} replayable_within_ttl=${replayable}"

          if [[ "${code1}" != "200" ]]; then
            echo "::error::first authentication did not return 200 (got ${code1}) — fix the positive path before reading the replay result"
            exit 1
          fi
          echo "Measurement complete. replay=${code2} (OSS expected 200; record as residual risk bounded by ttl=${ttl}s)."
